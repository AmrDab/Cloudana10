apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloudana
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: "orchestrator"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - cloudana
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: orchestrator
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+)
            replacement: ${1}:7002

      - job_name: "provider-nodes"
        static_configs:
          - targets: []
        # Provider nodes are external - add their IPs here

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
