apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: cloudana
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/amrdab/cloudana-orchestrator:latest
          ports:
            - containerPort: 7002
          envFrom:
            - configMapRef:
                name: cloudana-config
            - secretRef:
                name: cloudana-secrets
          env:
            - name: PORT
              value: "7002"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 7002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: cloudana
spec:
  selector:
    app: orchestrator
  ports:
    - port: 7002
      targetPort: 7002
