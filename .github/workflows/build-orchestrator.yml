name: Build & push orchestrator image

# Builds the Node orchestrator (client/api/Dockerfile) and pushes it to GHCR.
# This is the automated half of the Akash go-live: CI produces the image the
# Akash SDL (client/api/deploy.akash.yaml) references, so no local Docker is needed.

on:
  push:
    branches: [main]
    paths:
      - "client/api/**"
      - "shared/**"
      - "pouw/**"
      - ".github/workflows/build-orchestrator.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cloudana-orchestrator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "ref=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/api/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:latest
            ${{ steps.img.outputs.ref }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
